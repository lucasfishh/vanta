# Production edge config: TLS termination + host-based routing.
#   neuro-sync.app, www.neuro-sync.app  -> web   (main SPA)
#   docs.neuro-sync.app                 -> docs  (documentation)
#   /api/                               -> api   (NestJS)

map $host $upstream {
    default                 web;
    docs.neuro-sync.app     docs;
}

# HTTP: serve ACME challenge, redirect everything else to HTTPS.
server {
    listen 80;
    server_name neuro-sync.app www.neuro-sync.app docs.neuro-sync.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect apex-less and www to apex on HTTPS.
