services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neurosync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neurosync}
      POSTGRES_DB: neurosync
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurosync"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
