# Local development: db + api only. Run the web and docs frontends with
# `npm run dev` (they proxy /api to localhost:4000).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neurosync
      POSTGRES_PASSWORD: neurosync
      POSTGRES_DB: neurosync
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  api:
